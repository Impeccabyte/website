# cPanel Git Version Control deployment tasks.
#
# Only needed if your Node.js "Application root" is a DIFFERENT folder from the
# Git clone (this copies the checked-out files into the app root on Deploy).
# If the app root IS the clone folder (recommended, see DEPLOY.md), you can
# ignore this file and just use "Update from Remote".
#
# Edit DEPLOYPATH to your application root, then commit. After each Deploy you
# still run `npm install --include=dev && npm run build` and Restart the app
# from the Node.js Selector (the restricted deploy shell can't build reliably).
---
deployment:
  tasks:
    - export DEPLOYPATH=/home/CPANEL_USER/impeccabyte
    - /bin/cp -R ./* $DEPLOYPATH/
    - /bin/cp -f ./.cpanel.yml $DEPLOYPATH/.cpanel.yml
